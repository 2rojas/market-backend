services:
  db:
    image: postgres:15-alpine
    container_name: devmarket-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: devmarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: devmarket-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/devmarket
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "bunx drizzle-kit push && bun run dev"
  
  redis:
    image: redis:alpine
    container_name: devmarket-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
